<html>

<head>
    <script src="js/script.js"></script>
    <link href="css/styles.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>

    <div class="col-md-10 mx-auto pt-5">
        <h1>DATOS PERSONALES</h1>
    </div>

    <form class="col-md-10 mx-auto pt-5">
        <div class="form-group">
            <label class="pb-2" for="etiquetaNombrePersona">Introduce el nombre:</label>
            <input type="text" class="form-control" id="inputNombrePersona" placeholder="Nombre">
            <small id="infoInputNombrePersona" class="form-text text-muted mt-10">(*) Campo obligatorio</small>
        </div>
        <div class="form-group pt-3">
            <label class="pb-2" for="etiquetaApellidoPaternoPersona">Introduce el primer apellido:</label>
            <input type="text" class="form-control" id="inputApellidoPaterno" placeholder="Primer apellido">
            <small id="infoInputPrimerApellidoPersona" class="form-text text-muted">(*) Campo obligatiorio</small>
        </div>
        <div class="form-group pt-3">
            <label class="pb-2" for="etiquetaApellidoMaternoPersona">Introduce el segundo apellido:</label>
            <input type="text" class="form-control" id="inputApellidoMaterno" placeholder="Segundo apellido">
        </div>
        <div class="row pt-3">
            <div class="col">
                <div class="form-group">
                    <label class="pb-2" for="etiquetaTipoDocumento">Elija tipo de documento:</label>
                    <select class="form-control" id="selectorTipoDocumento">
                        <option>DNI</option>
                        <option>NIE</option>
                        <option>Pasaporte</option>
                    </select>
                    <small id="infoTipoDocumento" class="form-text text-muted">(*) Campo obligatiorio</small>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label class="pb-2" for="etiquetaNumeroDocumento">Número de identificación</label>
                    <input type="text" class="form-control" id="numeroIdentificacion" placeholder="Número de identificación">
                    <small id="infoNumeroIdentificacion" class="form-text text-muted">(*) Campo obligatiorio</small>
                </div>
            </div>
        </div>
        <div class="pt-3">
            <label class="pb-2" for="etiquetaGenero">Género:</label>
        </div>
        <div>
            <div class="form-check-inline">
                <input type="radio" class="form-check-input" name="generos" value="masculino" id="chekBoxGeneroMasculino">
                <label for="etiquetaGeneroMasculino" class="form-check-label">Masculino</label>
            </div>
            <div class="form-check-inline">
                <input type="radio" class="form-check-input" name="generos" value="femenino" id="checkBoxGeneroFemenino">
                <label for="etiquetaGeneroFemenino" class="form-check-label">Femenino</label>
            </div>
            <div class="form-check-inline">
                <input type="radio" class="form-check-input" name="generos" value="indefinido" id="checkBoxGeneroIndefinido">
                <label for="etiquetaGeneroIndefinido" class="form-check-label">Indefinido</label>
            </div>
            <div>
                <small id="infoInputGeneroPersona" class="form-text text-muted">(*) Campo obligatiorio</small>
            </div>
        </div>
    </form>

    <div class="col-md-10 mx-auto pt-5">
        <h1>DATOS DE CONTACTO</h1>
    </div>

    <form class="col-md-10 mx-auto pt-5">
        <div class="form-group">
            <label for="etiquetaTelefonoFijo">Introduce el teléfono fijo:</label>
            <input type="tel" class="form-control" id="inputTelefonoFijo" maxlength="9" placeholder="Teléfono">
            <small id="infoInputTelefonoFijo" class="form-text text-muted mt-10">(*) Campo obligatorio</small>
        </div>

</body>

</html>
